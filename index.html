<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
    <link rel="stylesheet" href="style.css">
    <link href="utils/flip/flip.min.css" rel="stylesheet">
    <link href="images/movie-favicon.png" rel="icon" type="image/x-icon" id="dynamic-favicon">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <!-- Google Fonts for Graffiti -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Faster+One&family=Knewave&family=Monoton&family=Oswald&family=Permanent+Marker&family=Rock+Salt&family=Rubik+Marker+Hatch&display=swap"
        rel="stylesheet">

    <!-- Preload Custom TTF Fonts -->
    <link rel="preload" href="fonts/Street2Art-Bold.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="fonts/FromStreetArt-Bold.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="fonts/Super Popstar.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="fonts/edo.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="fonts/HVD_Peace.ttf" as="font" type="font/ttf" crossorigin>

    <!-- Pickr Color Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css" />

    <!-- Application Scripts (loaded in order) -->
    <!-- Configuration -->
    <script src="config.js"></script>
    <script src="errorHandler.js"></script>

    <!-- Utilities -->
    <script src="utils/dateHelpers.js"></script>
    <script src="utils/diceRollLogic.js"></script>

    <!-- Repositories -->
    <script src="repositories/visitRepository.js"></script>

    <!-- Services -->
    <script src="services/apiService.js"></script>
    <script src="services/audioService.js"></script>
    <script src="services/dateService.js"></script>
    <script src="services/domService.js"></script>
    <script src="services/effectService.js"></script>
    <script src="services/soundBoardService.js"></script>
    <script src="services/videoService.js"></script>
    <script src="services/adminService.js"></script>
    <script src="services/drawingService.js"></script>
    <script src="services/graffitiService.js"></script>

    <!-- Use Cases -->
    <script src="useCases/dailyFlowUseCase.js"></script>
    <script src="useCases/coinFlipUseCase.js"></script>
    <script src="useCases/diceRollUseCase.js"></script>
    <script src="useCases/lockdownUseCase.js"></script>
    <script src="useCases/videoPlaybackUseCase.js"></script>

    <!-- Pickr Color Picker -->
    <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>

    <!-- Fabric.js for Drawing Canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <!-- Flip Counter Library -->
    <script src="utils/flip/flip.min.js"></script>

    <!-- Main Application -->
    <script src="app.js" defer></script>

    <title>Movie Chunk Player</title>
</head>

<body>
    <div id="snow"></div>
    <div id="confetti-container"></div>
    <div id="sonic"><img src="images/eric.gif" alt=""></div>
    <div id="renner"><img src="images/renner.gif" alt=""></div>
    <div id="rensday-text">HAPPY RENSDAY</div>
    <audio id="renner-audio" src="audio/renner.mp3" preload="auto"></audio>
    <video id="d20RollerVideo" autoplay muted playsinline>
        <source id="diceSource1"
            src="https://www.dropbox.com/scl/fo/pf5qpygokl52103vmx2w0/AIGuXJertFNeQ0qjpUFGuE8/d20_01-hevc-safari.mp4?rlkey=yut8p8rwa7fd1nv1bgkok5mum&raw=1"
            type='video/mp4; codecs="hvc1"'>
        <source id="diceSource2"
            src="https://www.dropbox.com/scl/fo/pf5qpygokl52103vmx2w0/ADq6fMo0orSzJRF4v3rvpGk/d20_01-vp9-chrome.webm?rlkey=yut8p8rwa7fd1bgkok5mum&raw=1"
            type="video/webm">
    </video>
    <div class="poster-section">
        <div id="poster-container-1" class="poster-container"><img class="poster-image" id="poster-image-1" src=""
                alt=""></div>
        <div id="dice-and-text-container">
            <div id="roll-button">
                <img src="images/die-eye.gif" alt="" id="deye">
            </div>
        </div>
        <div id="flip-button" style="display: none;">FLIP</div>
        <div id="poster-container-2" class="poster-container"><img class="poster-image" src="" alt=""
                id="poster-image-2"></div>
    </div>
    <div class="container hidden">
        <div id="top-bar">
            <div class="sunday-div">
                <h1 class="sunday-title">Today is Sunday, the day of rest, no chunk today!</h1>
                <button class="archive-button">Archive</button>
            </div>
            <div class="info-bar">
                <h1 class="ep-title"></h1>
                <div class="selectContainer">
                    <div class="numberDisplay"></div>
                    <select id="chunkSelector"></select>
                    <div id="dayCount"></div>
                    <audio id="morbius-sound" src="audio/cliff.mp3"></audio>
                    <audio id="diceAudio" preload="auto"></audio>
                    <audio id="randomAudio" preload="auto"></audio>
                </div>
            </div>
        </div>
        <div class="videoContainer">
            <div id="video-frame">
                <video id="videoPlayer" crossorigin="anonymous" controls playsinline
                    data-poster="images/chunkplayerlogo.png">
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>

            </div>
            <div id="todays-poster-container">
                <img src="" alt="" id="todays-poster">
            </div>
            <div id="soundboard">
                <h1>Drops</h1>
                <div class="tabs"></div>
                <div class="grid"></div>
            </div>
        </div>
        <div class="timer-container">
            <div id="countdown-timer">00:00:00</div>
        </div>
        <!-- Admin Section -->
        <div id="admin-section" class="admin-section hidden">
            <button id="admin-toggle-btn">⚙️</button>
            <div id="admin-panel" class="admin-panel hidden">
                <!-- Password Entry -->
                <div id="admin-login" class="admin-login">
                    <input type="password" id="admin-password" placeholder="Enter clearance code">
                    <button id="admin-login-btn">Access</button>
                    <span class="admin-error" id="admin-error"></span>
                </div>

                <!-- Level 1 Clearance (Self-Report) -->
                <div id="admin-level-1" class="admin-level display-none">
                    <h3>Level 1</h3>
                    <button id="punishment-report-btn" class="admin-action-btn danger">I morbed (missed a
                        chunk)</button>

                    <hr class="admin-divider">

                    <!-- Normal Poster Upload Section -->
                    <div class="admin-pointer-control poster-upload-section">
                        <label>Change Normal Poster</label>
                        <div class="poster-upload-controls">
                            <input type="file" id="poster-file-input" accept="image/jpeg,image/png"
                                style="display:none">
                            <button id="select-poster-btn" class="admin-action-btn">Select Image</button>
                            <button id="upload-poster-btn" class="admin-action-btn" style="display:none">Upload
                                Poster</button>
                            <div id="poster-upload-status" class="upload-status"></div>
                        </div>
                    </div>

                    <!-- Punishment Poster Upload Section -->
                    <div class="admin-pointer-control poster-upload-section">
                        <label>Change Punishment Poster</label>
                        <div class="poster-upload-controls">
                            <input type="file" id="punishment-poster-file-input" accept="image/jpeg,image/png"
                                style="display:none">
                            <button id="select-punishment-poster-btn" class="admin-action-btn">Select Image</button>
                            <button id="upload-punishment-poster-btn" class="admin-action-btn"
                                style="display:none">Upload
                                Poster</button>
                            <div id="punishment-poster-upload-status" class="upload-status"></div>
                        </div>
                    </div>
                </div>

                <!-- Level 2 Clearance (Admin Functions) -->
                <div id="admin-level-2" class="admin-level display-none">
                    <h3>Level 2</h3>

                    <!-- Pointer Controls -->
                    <div class="admin-pointer-control">
                        <label>Normal Pointer</label>
                        <div class="stepper-with-action">
                            <div class="stepper">
                                <button class="stepper-minus" data-type="normal">−</button>
                                <input type="number" class="stepper-input" id="normal-pointer-input" min="1">
                                <button class="stepper-plus" data-type="normal">+</button>
                            </div>
                            <button class="stepper-set-btn" data-type="normal">Set</button>
                        </div>
                    </div>

                    <div class="admin-pointer-control">
                        <label>Punishment Pointer</label>
                        <div class="stepper-with-action">
                            <div class="stepper">
                                <button class="stepper-minus" data-type="punishment">−</button>
                                <input type="number" class="stepper-input" id="punishment-pointer-input" min="1">
                                <button class="stepper-plus" data-type="punishment">+</button>
                            </div>
                            <button class="stepper-set-btn" data-type="punishment">Set</button>
                        </div>
                    </div>

                    <div class="admin-pointer-control">
                        <label>Reward Pointer</label>
                        <div class="stepper-with-action">
                            <div class="stepper">
                                <button class="stepper-minus" data-type="reward">−</button>
                                <input type="number" class="stepper-input" id="reward-pointer-input" min="1">
                                <button class="stepper-plus" data-type="reward">+</button>
                            </div>
                            <button class="stepper-set-btn" data-type="reward">Set</button>
                        </div>
                    </div>

                    <div class="admin-pointer-control">
                        <label>Jokerless Days</label>
                        <div class="stepper-with-action">
                            <div class="stepper">
                                <button class="stepper-minus" data-type="jokerlessdays">−</button>
                                <input type="number" class="stepper-input" id="jokerless-days-input" min="0">
                                <button class="stepper-plus" data-type="jokerlessdays">+</button>
                            </div>
                            <button class="stepper-set-btn" data-type="jokerlessdays">Set</button>
                        </div>
                    </div>

                    <div class="admin-pointer-control">
                        <label>Jokerless Days Old</label>
                        <div class="stepper-with-action">
                            <div class="stepper">
                                <button class="stepper-minus" data-type="jokerlessdaysold">−</button>
                                <input type="number" class="stepper-input" id="jokerless-days-old-input" min="0">
                                <button class="stepper-plus" data-type="jokerlessdaysold">+</button>
                            </div>
                            <button class="stepper-set-btn" data-type="jokerlessdaysold">Set</button>
                        </div>
                    </div>

                    <!-- Fake Roll Control -->
                    <div class="admin-pointer-control">
                        <label>Execute Fake Roll</label>
                        <div class="stepper">
                            <button class="stepper-minus" data-type="fakeroll">−</button>
                            <input type="number" class="stepper-input" id="fake-roll-input" min="1" max="20">
                            <button class="stepper-plus" data-type="fakeroll">+</button>
                        </div>
                        <button id="execute-fake-roll-btn" class="admin-action-btn">Execute Fake Roll</button>
                    </div>

                    <!-- Test Flip Counter -->
                    <div class="admin-pointer-control">
                        <label>Test Flip Counter</label>
                        <div class="stepper">
                            <button class="stepper-minus" data-type="testflip">−</button>
                            <input type="number" class="stepper-input" id="test-flip-input" min="0">
                            <button class="stepper-plus" data-type="testflip">+</button>
                        </div>
                        <button id="test-flip-btn" class="admin-action-btn">Flip to</button>
                    </div>

                    <hr class="admin-divider">

                    <button id="bypass-lockdown-btn" class="admin-action-btn">Bypass Lockdown</button>
                    <button id="bypass-sunday-btn" class="admin-action-btn">Bypass Sunday</button>
                    <button id="clear-last-visit-btn" class="admin-action-btn">Clear Last Visit</button>

                    <hr class="admin-divider">

                    <div class="admin-pointer-control">
                        <label>Set Test Date</label>
                        <div class="test-date-controls">
                            <select id="test-date-day">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                                <option value="21">21</option>
                                <option value="22">22</option>
                                <option value="23">23</option>
                                <option value="24">24</option>
                                <option value="25">25</option>
                                <option value="26">26</option>
                                <option value="27">27</option>
                                <option value="28">28</option>
                                <option value="29">29</option>
                                <option value="30">30</option>
                                <option value="31">31</option>
                            </select>
                            <select id="test-date-month">
                                <option value="1">Jan</option>
                                <option value="2">Feb</option>
                                <option value="3">Mar</option>
                                <option value="4">Apr</option>
                                <option value="5">May</option>
                                <option value="6">Jun</option>
                                <option value="7">Jul</option>
                                <option value="8">Aug</option>
                                <option value="9">Sep</option>
                                <option value="10">Oct</option>
                                <option value="11">Nov</option>
                                <option value="12">Dec</option>
                            </select>
                            <select id="test-date-hour">
                                <option value="0">00</option>
                                <option value="1">01</option>
                                <option value="2">02</option>
                                <option value="3">03</option>
                                <option value="4">04</option>
                                <option value="5">05</option>
                                <option value="6">06</option>
                                <option value="7">07</option>
                                <option value="8">08</option>
                                <option value="9">09</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="13">13</option>
                                <option value="14">14</option>
                                <option value="15">15</option>
                                <option value="16">16</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                                <option value="21">21</option>
                                <option value="22">22</option>
                                <option value="23">23</option>
                            </select>
                            <button id="set-test-date-btn" class="admin-action-btn">Set</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast hidden">
            <span id="toast-message"></span>
        </div>

        <!-- Confirmation Dialog -->
        <div id="confirm-dialog" class="confirm-dialog hidden">
            <div class="confirm-content">
                <p id="confirm-message">Are you sure you are ready to morb?</p>
                <div class="confirm-buttons">
                    <button id="confirm-yes" class="confirm-btn yes">Yes, I morbed</button>
                    <button id="confirm-no" class="confirm-btn no">Cancel</button>
                </div>
            </div>
        </div>

    </div>
    <div id="flip-counter-wrapper">
        <div id="flip-counter-label" class="flip-counter-label">Days since last Joker</div>
        <div id="flip-counter" class="tick tick-flip" data-credits="false">
            <div data-layout="horizontal center" data-repeat="true"
                data-transform="tween(2s, ease-in-out-expo) -> round -> pad('000') -> split -> delay(rtl, 100, 150)">
                <span data-view="flip"></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="utils/plyr-plugin-capture.js"></script>
    <script src="utils/flip/flip.min.js"></script>
</body>

</html>
